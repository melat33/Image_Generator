<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="Container">

    <div class="left-section">
        <h1>ALPACA GENERATOR</h1>

        <div class="Image-Preview">
            <canvas id="alpacaCanv"></canvas>
        </div>

        <div class="action-buttons">
            <button id="randomizeButton">Randomize</button>
            <button id="downloadButton">Download</button>
        </div>
    </div>

    <div class="right-section">

        <div class="accessories-panel">
            <h2>ACCESSORIZE THE ALPACA'S</h2>

            <div class="category-list">
                <div class="category-item" data-category="hair">Hair</div>
                <div class="category-item" data-category="ears">Ears</div>
                <div class="category-item" data-category="eyes">Eyes</div>
                <div class="category-item" data-category="mouth">Mouth</div>
                <div class="category-item" data-category="neck">Neck</div>
                <div class="category-item" data-category="leg">Leg</div>
                <div class="category-item" data-category="accessories">Accessories</div>
                <div class="category-item" data-category="background">Background</div>
            </div>
        </div>

        <div class="style-section">
            <h3>STYLE</h3>

            <div class="style-options">
                <div class="style-option" data-style="default">Default</div>
                <div class="style-option" data-style="curls">Curls</div>
                <div class="style-option" data-style="short">Short</div>
                <div class="style-option" data-style="bang">Bang</div>
                <div class="style-option" data-style="elegant">Elegant</div>
                <div class="style-option" data-style="quiff">Quiff</div>
            </div>
        </div>

    </div>

</div>

</body>
<script src="script.js"></script>
</html>
